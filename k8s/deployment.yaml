apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
      - name: petclinic
        image: image: 186014908456.dkr.ecr.us-east-1.amazonaws.com/petclinic-app:v1
        ports:
        - containerPort: 8080
